name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check repository whitespace
        run: git diff --check 4b825dc642cb6eb9a060e54bf8d69288fbee4904 HEAD
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.2
      - name: Install frozen dependencies
        run: deno install --frozen
      - name: Format, lint, and type check
        run: deno task check
      - name: Contract and SDK tests
        run: deno task test
      - name: Fresh production build
        run: deno task build

  container:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v7
      - name: Build container
        run: docker build --tag agnes-compatible-gateway:ci .
