name: Release container

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  image:
    name: Publish multi-architecture image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
          labels: |
            org.opencontainers.image.title=Agnes OpenAI Compatible Gateway
            org.opencontainers.image.description=Stateless OpenAI-compatible gateway for Agnes AI
            org.opencontainers.image.licenses=MIT

      - name: Build and publish image, SBOM, and provenance
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DENO_DEPLOYMENT_ID=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Verify published architectures and container health
        shell: bash
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail

          manifest="$(docker buildx imagetools inspect --raw "$IMAGE@$DIGEST")"
          jq --exit-status '
            [.manifests[].platform
              | select(.os == "linux")
              | .architecture]
            | (index("amd64") != null and index("arm64") != null)
          ' <<<"$manifest" >/dev/null

          docker pull --platform linux/amd64 "$IMAGE@$DIGEST"
          docker run --detach --name gateway-release-smoke \
            --read-only \
            --tmpfs /tmp:size=64m,mode=1777 \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --publish 127.0.0.1:18000:8000 \
            "$IMAGE@$DIGEST"

          cleanup() {
            docker logs gateway-release-smoke || true
            docker rm --force gateway-release-smoke || true
          }
          trap cleanup EXIT

          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error \
              http://127.0.0.1:18000/healthz >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          echo "Published container did not become healthy" >&2
          exit 1
